<!DOCTYPE html>
<html>
<head>
  <base href="/">
<meta name="google-signin-client_id" content="128784053347-fhld2nolbkkdea1ufa4v580t38ovl1il.apps.googleusercontent.com">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AstroQuiz">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gk_quiz_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AstroQuiz</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100vh;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .logo-text {
      color: #38BDF8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s infinite ease-in-out;
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      width: 100%;
      margin: 0;
    }

    .sub-text {
      color: #94A3B8;
      font-family: sans-serif;
      font-size: 1rem;
      margin-top: 10px;
      letter-spacing: 5px;
      width: 100%;
      text-align: center;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.4; transform: scale(0.95); }
    }

    .loader {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      margin-top: 30px;
      position: relative;
      overflow: hidden;
      border-radius: 5px;
    }

    .loader::after {
      content: '';
      position: absolute;
      width: 80px;
      height: 100%;
      background: #38BDF8;
      animation: loading 1.5s infinite ease-in-out;
    }

    @keyframes loading {
      0% { left: -80px; }
      100% { left: 200px; }
    }
  </style>
</head>
<body>
  <div class="container" id="loading-indicator">
    <div class="logo-text">Orbitview Innovations</div>
    <div class="sub-text">LOADING...</div>
    <div class="loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('load', function() {
      var loadingIndicator = document.getElementById('loading-indicator');
      
      _flutter.loader.load({
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          
          if (loadingIndicator) {
            loadingIndicator.style.transition = "opacity 0.5s ease";
            loadingIndicator.style.opacity = "0";
            setTimeout(function() {
              loadingIndicator.remove();
            }, 500);
          }
          
          await appRunner.runApp();
        }
      });

      setTimeout(function() {
        if (loadingIndicator && document.body.contains(loadingIndicator)) {
          console.warn("Flutter load timeout. Forcing refresh...");
          // Optional: window.location.reload(); 
        }
      }, 15000);
    });
  </script>
</body>
</html>
