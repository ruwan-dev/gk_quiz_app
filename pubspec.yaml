name: gk_quiz_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  percent_indicator: ^4.2.3
  cloud_firestore: ^4.14.0
  firebase_core: ^2.24.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Fonts කොටස මෙතනට එකතු කරන්න
  fonts:
    - family: SinhalaFont
      fonts:

        - asset: assets/fonts/4u-Ananda UltraBold.ttf

          weight: 700